<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Production Calculator</title>
</head>
<body>
    
    <h1>Resource Production Calculator</h1>

    <div class="container">
        <div class="input-panel">   
            <label>Produção desejada (barras/mon)</label>
            <input id="target" type="number" placeholder="Ex: 60">
        
            <button id="calculate">Calcular</button>
        </div>

        <div class="result-panel">

            <h3>Resultado</h3>

            <p>Fundidoras necessárias: <span id="smelters">0</span></p>

            <p>Minério necessário: <span id="ore">0</span> / min</p>
        </div>
    </div>

    <script src="app.js"></script>

</body>
</html>
